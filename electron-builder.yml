appId: com.imagevibe.app
productName: ImageVibe
copyright: Copyright © 2026 ImageVibe

directories:
  output: dist-build

files:
  - dist/**/*
  - dist-electron/**/*
  - "!node_modules/**/*"

extraResources:
  - from: node_modules/better-sqlite3/build/Release/
    to: native/better-sqlite3/
    filter:
      - "*.node"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.graphics-design

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/icon.png
  category: Graphics

asar: true
